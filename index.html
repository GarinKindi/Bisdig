                                    {menu.items && openDropdown === menu.page && (
                                        <div className="absolute top-full left-0 mt-1 w-56 bg-white border border-slate-100 rounded-2xl shadow-xl py-2 overflow-hidden z-50 transform origin-top-left transition-all">
                                            {menu.items.map(item => (
                                                <button key={item.sub} onClick={() => { navigate(menu.page, item.sub); setOpenDropdown(null); }}
                                                    className={`block w-full text-left px-5 py-2.5 text-sm font-medium transition-colors ${currentPage === menu.page && currentSubPage === item.sub ? 'bg-slate-50 text-brand-primary' : 'text-slate-600 hover:bg-slate-50 hover:text-brand-primary'}`}>
                                                    {item.name}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>

                        <div className="hidden lg:flex items-center">
                            <button className="bg-brand-primary hover:bg-blue-700 text-white px-6 py-2.5 rounded-full text-sm font-bold transition-all shadow-sm hover:shadow-md">
                                Daftar Sekarang
                            </button>
                        </div>

                        <button className="lg:hidden text-brand-dark p-2 bg-slate-50 rounded-lg" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                            <Icon name={mobileMenuOpen ? "close" : "menu"} className="w-6 h-6" />
                        </button>
                    </div>

                    {/* Mobile Menu */}
                    {mobileMenuOpen && (
                        <div className="lg:hidden absolute top-full left-0 w-full bg-white border-t border-slate-100 shadow-xl py-4 px-4 flex flex-col gap-2 max-h-[80vh] overflow-y-auto">
                            {menuStructure.map((menu) => (
                                <div key={menu.name} className="border-b border-slate-50 last:border-0 pb-2 mb-2 last:pb-0 last:mb-0">
                                    <button onClick={() => { if (!menu.items) { navigate(menu.page); setMobileMenuOpen(false); } else { setOpenDropdown(openDropdown === menu.page ? null : menu.page); } }}
                                        className={`flex items-center justify-between w-full text-left text-base font-semibold p-3 rounded-xl ${isActive(menu.page) ? 'text-brand-primary bg-brand-primary/5' : 'text-slate-700'}`}>
                                        {menu.name}
                                        {menu.items && <Icon name={openDropdown === menu.page ? "chevronDown" : "chevronRight"} className="w-4 h-4" />}
                                    </button>
                                    
                                    {menu.items && openDropdown === menu.page && (
                                        <div className="mt-1 pl-4 space-y-1 border-l-2 border-brand-primary/20 ml-4">
                                            {menu.items.map(item => (
                                                <button key={item.sub} onClick={() => { navigate(menu.page, item.sub); setMobileMenuOpen(false); }}
                                                    className={`block w-full text-left text-sm py-2.5 px-3 rounded-lg ${currentPage === menu.page && currentSubPage === item.sub ? 'text-brand-primary font-bold bg-brand-primary/5' : 'text-slate-500 font-medium'}`}>
                                                    {item.name}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ))}
                            <button className="mt-4 bg-brand-primary text-white px-4 py-3.5 rounded-xl text-sm font-bold w-full text-center">Daftar Sekarang</button>
                        </div>
                    )}
                </nav>
            );
        };

        const PageHero = ({ label, title, description, backgroundImage, breadcrumb = [] }) => (
            <div className="relative w-full h-[40vh] md:h-[45vh] min-h-[350px] bg-brand-dark overflow-hidden mt-[72px]">
                <img src={backgroundImage} alt={title} className="w-full h-full object-cover object-center" />
                <div className="absolute inset-0 page-hero-gradient"></div>
                <div className="absolute inset-0 flex items-center">
                    <div className="max-w-7xl mx-auto px-4 lg:px-8 w-full">
                        <div className="max-w-2xl">
                            <div className="flex items-center gap-2 text-xs md:text-sm font-semibold text-brand-accent mb-4 uppercase tracking-wider flex-wrap">
                                {breadcrumb.map((item, i) => (
                                    <React.Fragment key={i}>
                                        {i > 0 && <Icon name="chevronRight" className="w-3 h-3 opacity-70" />}
                                        <span className={i === breadcrumb.length - 1 ? 'text-white' : 'opacity-70'}>{item}</span>
                                    </React.Fragment>
                                ))}
                            </div>
                            <h1 className="text-3xl md:text-4xl lg:text-5xl font-black text-white leading-[1.1] mb-4">{title}</h1>
                            {description && <p className="text-base md:text-lg text-slate-300 max-w-xl font-medium">{description}</p>}
                        </div>
                    </div>
                </div>
            </div>
        );

        const SectionHeader = ({ label, title, description = "", center = false }) => (
            <div className={`mb-12 ${center ? 'text-center' : ''}`}>
                {label && <span className="text-brand-primary font-bold text-sm tracking-widest uppercase mb-4 block">{label}</span>}
                <h2 className="text-3xl md:text-4xl font-black text-brand-dark leading-tight">{title}</h2>
                {description && <p className="text-slate-500 mt-4 max-w-2xl mx-auto">{description}</p>}
            </div>
        );

        const CTASection = ({ title, description, primaryBtn, secondaryBtn }) => (
            <section className="relative py-20 md:py-24 overflow-hidden">
                <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80" alt="Kampus" className="absolute inset-0 w-full h-full object-cover object-center" />
                <div className="absolute inset-0 bg-brand-dark/80 mix-blend-multiply"></div>
                <div className="relative z-10 max-w-4xl mx-auto px-4 lg:px-8 text-center">
                    <h2 className="text-3xl md:text-4xl font-black text-white leading-[1.1] mb-6">{title}</h2>
                    <p className="text-lg text-slate-300 mb-8 max-w-2xl mx-auto font-medium">{description}</p>
                    <div className="flex flex-col sm:flex-row gap-4 justify-center">
                        {primaryBtn && <button className="bg-brand-primary hover:bg-blue-500 text-white px-8 py-4 rounded-full font-bold text-lg transition-all shadow-lg">{primaryBtn}</button>}
                        {secondaryBtn && <button className="bg-white/10 backdrop-blur-md border border-white/30 hover:bg-white/20 text-white px-8 py-4 rounded-full font-bold text-lg transition-all">{secondaryBtn}</button>}
                    </div>
                </div>
            </section>
        );

        const EmptyState = ({ message }) => (
            <div className="text-center py-16 bg-slate-50 rounded-3xl border border-slate-100">
                <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm border border-slate-100">
                    <Icon name="document" className="w-8 h-8 text-slate-300" />
                </div>
                <p className="text-slate-500 font-medium">{message}</p>
            </div>
        );

        const AnimatedPortrait = ({ src, alt, className = "", mode = "photo" }) => {
            const [mousePos, setMousePos] = React.useState({ x: 0, y: 0 });
            const [imgError, setImgError] = React.useState(false);
            const [prefersReducedMotion, setPrefersReducedMotion] = React.useState(false);

            React.useEffect(() => {
                const mediaQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
                setPrefersReducedMotion(mediaQuery.matches);
                const handler = (e) => setPrefersReducedMotion(e.matches);
                mediaQuery.addEventListener('change', handler);
                return () => mediaQuery.removeEventListener('change', handler);
            }, []);

            const onMouseMoveHandler = (e) => {
                try {
                    if (prefersReducedMotion) return;
                    const rect = e.currentTarget.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width - 0.5;
                    const y = (e.clientY - rect.top) / rect.height - 0.5;
                    setMousePos({ x, y });
                } catch (err) {}
            };
            
            const onMouseLeaveHandler = () => { 
                if (prefersReducedMotion) return;
                setMousePos({ x: 0, y: 0 }); 
            };

            const gridP = { x: mousePos.x * 3, y: mousePos.y * 3 };
            const glowP = { x: mousePos.x * 5, y: mousePos.y * 5 };
            const ringP = { x: mousePos.x * 7, y: mousePos.y * 7 };
            const portraitP = { x: mousePos.x * 10, y: mousePos.y * 10 };
            const fgP = { x: mousePos.x * 15, y: mousePos.y * 15 };
            const tiltX = mousePos.y * -3;
            const tiltY = mousePos.x * 5;

            return (
                <div className={`relative w-full max-w-[400px] aspect-[4/5] mx-auto flex items-end justify-center cursor-default group ${className}`} onMouseMove={onMouseMoveHandler} onMouseLeave={onMouseLeaveHandler}>
                    <div className="absolute inset-4 opacity-20 rounded-3xl z-[1] transition-opacity duration-700 group-hover:opacity-40" style={{ backgroundImage: 'radial-gradient(circle at center, #ffffff 1.5px, transparent 1.5px)', backgroundSize: '24px 24px', transform: prefersReducedMotion ? 'none' : `translate(${gridP.x}px, ${gridP.y}px)` }}></div>
                    <div className="absolute top-1/4 left-1/4 w-32 h-32 z-[2]" style={{ transform: prefersReducedMotion ? 'none' : `translate(${glowP.x}px, ${glowP.y}px)` }}><div className="w-full h-full bg-brand-primary rounded-full mix-blend-screen filter blur-[60px] animate-pulse-glow"></div></div>
                    <div className="absolute bottom-1/3 right-1/4 w-40 h-40 z-[2]" style={{ transform: prefersReducedMotion ? 'none' : `translate(${glowP.x * -0.8}px, ${glowP.y * -0.8}px)` }}><div className="w-full h-full bg-brand-accent rounded-full mix-blend-screen filter blur-[70px] animate-pulse-glow" style={{ animationDelay: '2.5s' }}></div></div>
                    <div className="absolute inset-8 z-[3]" style={{ transform: prefersReducedMotion ? 'none' : `translate(${ringP.x}px, ${ringP.y}px)` }}><div className="w-full h-full border border-white/10 rounded-full border-dashed animate-spin-very-slow"></div></div>
                    <div className="absolute inset-14 z-[3]" style={{ transform: prefersReducedMotion ? 'none' : `translate(${ringP.x * -1}px, ${ringP.y * -1}px)` }}><div className="w-full h-full border border-brand-primary/20 rounded-full animate-spin-very-slow" style={{ animationDirection: 'reverse', animationDuration: '60s' }}></div></div>
                    <div className="absolute top-1/3 left-6 w-1.5 h-1.5 bg-brand-accent rounded-full animate-pulse z-[10]" style={{ transform: prefersReducedMotion ? 'none' : `translate(${fgP.x * 0.5}px, ${fgP.y * 0.5}px)` }}></div>
                    <div className="absolute bottom-1/4 right-8 w-2 h-2 bg-brand-primary rounded-full animate-pulse z-[10]" style={{ animationDelay: '1s', transform: prefersReducedMotion ? 'none' : `translate(${fgP.x * 0.4}px, ${fgP.y * 0.4}px)` }}></div>
                    <div className="relative z-20 w-full h-full transition-all duration-500 ease-out flex items-end justify-center pb-0 portrait-3d-scene" style={{ transform: prefersReducedMotion ? 'none' : `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`, transition: 'transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)' }}>
                        <div className={`relative w-full h-full flex items-end justify-center ${prefersReducedMotion ? '' : 'animate-float-slow'}`}>
                            <div className="relative w-full h-full flex items-end justify-center pb-0" style={{ transform: prefersReducedMotion ? 'none' : `translate(${portraitP.x}px, ${portraitP.y}px)`, transition: 'transform 0.4s cubic-bezier(0.23, 1, 0.32, 1)' }}>
                                {imgError ? (
                                    <div className="w-full h-full flex items-end justify-center pb-4 opacity-80">
                                        <svg viewBox="0 0 200 200" fill="none" className="w-[75%] max-h-full text-brand-accent animate-pulse-glow">
                                            <path d="M100 95C119.33 95 135 79.33 135 60C135 40.67 119.33 25 100 25C80.67 25 65 40.67 65 60C65 79.33 80.67 95 100 95Z" stroke="currentColor" strokeWidth="3" strokeDasharray="4 4" />
                                            <path d="M40 180C40 146.863 66.8629 120 100 120C133.137 120 160 146.863 160 180" stroke="currentColor" strokeWidth="3" strokeDasharray="4 4" />
                                        </svg>
                                    </div>
                                ) : mode === "portrait" ? (
                                    <div className="relative w-[85%] h-[90%] mb-4 flex items-end justify-center">
                                        <img src={src} alt={alt} onError={() => setImgError(true)} className="w-full h-full object-contain drop-shadow-[0_25px_35px_rgba(0,0,0,0.5)]" style={{ filter: 'drop-shadow(0 0 25px rgba(56,189,248,0.25))' }} />
                                    </div>
                                ) : (
                                    <div className="relative w-[80%] aspect-[3/4] mb-6 group-hover:scale-[1.02] transition-transform duration-500">
                                        <div className="absolute inset-0 rounded-[40px] overflow-hidden shadow-2xl border border-white/10" style={{ WebkitMaskImage: 'linear-gradient(to bottom, black 70%, transparent 100%), linear-gradient(to right, black 85%, transparent 100%)', maskImage: 'linear-gradient(to bottom, black 70%, transparent 100%), linear-gradient(to right, black 85%, transparent 100%)', WebkitMaskComposite: 'source-in', maskComposite: 'intersect' }}>
                                            <img src={src} alt={alt} onError={() => setImgError(true)} className="w-full h-full object-cover filter contrast-[1.05] saturate-[1.05]" />
                                            <div className="absolute inset-0 mix-blend-overlay shadow-[inset_0_0_20px_rgba(255,255,255,0.3)] rounded-[40px] pointer-events-none"></div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                    <div className="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-brand-dark to-transparent z-30 pointer-events-none"></div>
                </div>
            );
        };

        const ProfileNavigation = ({ currentSubPage, navigate }) => {
            const subMenus = [
                { name: 'Tentang Prodi', sub: 'tentang' },
                { name: 'Visi & Misi', sub: 'visi-misi' },
                { name: 'Sejarah', sub: 'sejarah' },
                { name: 'Sambutan', sub: 'sambutan-kaprodi' },
                { name: 'Organisasi', sub: 'struktur-organisasi' },
                { name: 'Dosen', sub: 'dosen' },
                { name: 'Akreditasi', sub: 'akreditasi' }
            ];

            return (
                <div className="bg-white border-b border-slate-100 sticky top-[72px] z-40 shadow-sm">
                    <div className="max-w-7xl mx-auto px-4 lg:px-8">
                        <div className="flex overflow-x-auto hide-scrollbar gap-2 py-3">
                            {subMenus.map(item => (
                                <button key={item.sub} onClick={() => navigate('profil', item.sub)}
                                    className={`whitespace-nowrap px-5 py-2 rounded-full text-sm font-bold transition-all shrink-0 border ${currentSubPage === item.sub ? 'bg-brand-primary border-brand-primary text-white shadow-md' : 'bg-white border-slate-200 text-slate-600 hover:border-brand-primary hover:text-brand-primary'}`}>
                                    {item.name}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const TentangProdi = ({ data }) => (
            <>
                <section className="py-20 md:py-28 bg-white">
                    <div className="max-w-7xl mx-auto px-4 lg:px-8">
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                            <div>
                                <SectionHeader label="Tentang Program Studi" title={data.introTitle} />
                                <div className="space-y-4 text-slate-600 leading-relaxed text-lg">
                                    {data.introDescription.map((p, i) => <p key={i}>{p}</p>)}
                                </div>
                            </div>
                            <div className="relative aspect-[4/3] rounded-[2rem] overflow-hidden group shadow-2xl">
                                <img src="https://images.unsplash.com/photo-1552664730-d307ca884978?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" alt="Pembelajaran" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                <div className="absolute inset-0 bg-brand-primary/10 mix-blend-overlay"></div>
                            </div>
                        </div>
                    </div>
                </section>
                <section className="py-20 bg-brand-light">
                    <div className="max-w-7xl mx-auto px-4 lg:px-8">
                        <SectionHeader label="Nilai Utama" title="Pendidikan yang Membentuk Karakter" center={true} />
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-5xl mx-auto">
                            {data.coreValues.map((v, i) => (
                                <div key={i} className="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 flex gap-6 items-start hover:shadow-md hover:-translate-y-1 transition-all duration-300">
                                    <div className="w-14 h-14 rounded-2xl bg-blue-50 flex items-center justify-center text-brand-primary shrink-0 border border-blue-100"><Icon name={v.icon} className="w-6 h-6" /></div>
                                    <div><h3 className="text-xl font-bold text-brand-dark mb-2">{v.title}</h3><p className="text-slate-500">{v.description}</p></div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            </>
        );

        const VisiMisi = ({ data }) => (
            <>
                <section className="py-20 md:py-28 bg-white">
                    <div className="max-w-7xl mx-auto px-4 lg:px-8">
                        <div className="text-center mb-16">
                            <span className="text-brand-primary font-bold text-sm tracking-widest uppercase mb-4 block">Visi Program Studi</span>
                            <h2 className="text-3xl md:text-4xl lg:text-5xl font-black text-brand-dark leading-tight max-w-4xl mx-auto">{data.vision}</h2>
                        </div>
                        <div className="max-w-5xl mx-auto bg-brand-dark rounded-[3rem] p-8 md:p-16 text-white relative overflow-hidden shadow-2xl">
                            <div className="absolute top-0 right-0 w-[400px] h-[400px] bg-brand-primary/30 rounded-full filter blur-[100px] -translate-y-1/2 translate-x-1/3"></div>
                            <h3 className="text-2xl font-bold mb-8 relative z-10 flex items-center gap-3"><Icon name="target" className="w-8 h-8 text-brand-accent" /> Misi Program Studi</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 relative z-10">
                                {data.missions.map((mission, i) => (
                                    <div key={i} className="flex gap-4 items-start">
                                        <div className="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-brand-accent font-black shrink-0 border border-white/20">0{i + 1}</div>
                                        <p className="text-slate-300 font-medium leading-relaxed">{mission}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </section>
            </>
        );

        const SejarahProdi = ({ data }) => (
            <>
                <section className="py-20 md:py-28 bg-white overflow-hidden">
                    <div className="max-w-7xl mx-auto px-4 lg:px-8">
                        <SectionHeader label="Perjalanan" title="Sejarah Program Studi" center={true} description="Tonggak penting dalam pembentukan dan pengembangan prodi." />
                        <div className="relative max-w-4xl mx-auto py-10">
                            <div className="absolute left-[27px] md:left-1/2 top-0 bottom-0 w-1 timeline-line transform md:-translate-x-1/2 rounded-full"></div>
                            <div className="space-y-16">
                                {data.map((item, i) => (
                                    <div key={i} className={`relative flex flex-col md:flex-row gap-8 items-start group ${i % 2 === 0 ? 'md:flex-row' : 'md:flex-row-reverse'}`}>
                                        <div className={`flex-1 w-full pl-20 md:pl-0 ${i % 2 === 0 ? 'md:text-right md:pr-12' : 'md:text-left md:pl-12'}`}>
                                            <div className="bg-white p-8 rounded-[2rem] shadow-soft border border-slate-100 group-hover:border-brand-primary/30 transition-colors">
                                                <span className="text-brand-primary font-black text-3xl block mb-2">{item.year}</span>
                                                <h3 className="text-xl font-bold text-brand-dark mb-3">{item.title}</h3>
                                                <p className="text-slate-500 leading-relaxed">{item.description}</p>
                                            </div>
                                        </div>
                                        <div className="absolute left-0 md:left-1/2 top-6 md:top-8 transform md:-translate-x-1/2 z-10 flex items-center justify-center">
                                            <div className="w-14 h-14 bg-white rounded-full border-4 border-brand-primary flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform">
                                                <div className="w-4 h-4 bg-brand-primary rounded-full"></div>
                                            </div>
                                        </div>
                                        <div className="flex-1 hidden md:block"></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </section>
            </>
        );

        const KaprodiSection = ({ data }) => (
            <section className="py-20 md:py-28 bg-brand-dark text-white relative overflow-hidden">
                <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-brand-primary/10 rounded-full filter blur-[120px] -translate-y-1/2 translate-x-1/3"></div>
                <div className="max-w-7xl mx-auto px-4 lg:px-8 relative z-10">
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-8 items-center">
                        <div className="lg:col-span-5 order-2 lg:order-1"><AnimatedPortrait src={data.photo} alt={data.name} mode="photo" /></div>
                        <div className="lg:col-span-7 order-1 lg:order-2 lg:pl-8">
                            <span className="inline-flex items-center gap-3 text-brand-accent font-bold text-sm tracking-widest uppercase mb-6"><div className="w-8 h-[2px] bg-brand-accent"></div>Sambutan Ketua Program Studi</span>
                            <h2 className="text-3xl md:text-4xl lg:text-5xl font-black text-white leading-[1.1] mb-8 italic">"{data.greeting.split('.')[0]}."</h2>
                            <div className="space-y-4 text-slate-300 text-base md:text-lg leading-relaxed mb-10 font-light border-l-4 border-brand-primary/50 pl-6 py-2"><p>{data.greeting}</p></div>
                            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-6 border-t border-slate-700/50 pt-8">
                                <div><h4 className="text-xl font-bold text-white mb-1">{data.name}, {data.degree}</h4><p className="text-brand-accent text-sm font-medium uppercase">{data.position}</p></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        );

        const StrukturOrganisasi = ({ data }) => {
            const renderMember = (member, isRoot = false) => (
                <div key={member.id} className="flex flex-col items-center relative">
                    <div className={`bg-white p-5 rounded-3xl shadow-soft border ${isRoot ? 'border-brand-primary border-2 shadow-xl' : 'border-slate-100'} text-center w-56 relative z-10`}>
                        <div className="w-20 h-20 rounded-full bg-slate-100 mx-auto mb-4 overflow-hidden border-4 border-white shadow-sm">
                            {member.photo ? <img src={member.photo} alt={member.name} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-slate-400"><Icon name="users" className="w-8 h-8" /></div>}
                        </div>
                        <h4 className="font-bold text-brand-dark text-sm mb-1">{member.name}</h4>
                        <p className={`text-xs font-bold uppercase tracking-wide ${isRoot ? 'text-brand-primary' : 'text-slate-500'}`}>{member.position}</p>
                    </div>
                    {member.children && member.children.length > 0 && (
                        <>
                            <div className="w-0.5 h-8 bg-slate-200"></div>
                            <div className="border-t-2 border-slate-200 w-[calc(100%-14rem)] absolute top-[11.5rem] -z-0 hidden md:block"></div>
                            <div className="flex flex-col md:flex-row gap-8 md:gap-12 justify-center relative">
                                {member.children.map(child => (
                                    <div key={child.id} className="relative flex flex-col items-center">
                                        <div className="w-0.5 h-8 bg-slate-200 hidden md:block"></div>
                                        {renderMember(child)}
                                    </div>
                                ))}
                            </div>
                        </>
                    )}
                </div>
            );

                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4 auto-rows-[220px]">
                                {[{ icon: "trendingUp", title: "DIGITAL MARKETING", desc: "Strategi pemasaran multi-platform.", img: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80", cs: "md:col-span-2 lg:col-span-2", rs: "row-span-2" }, { icon: "smartphone", title: "E-COMMERCE", desc: "Ritel & transaksi digital.", img: "https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80", cs: "col-span-1", rs: "row-span-1" }, { icon: "pieChart", title: "BUSINESS ANALYTICS", desc: "Data menjadi keputusan.", img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80", cs: "col-span-1", rs: "row-span-1" }, { icon: "lightbulb", title: "ENTREPRENEURSHIP", desc: "Bisnis adaptif teknologi.", img: "https://images.unsplash.com/photo-1522202176988-66273c2fd55f?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80", cs: "col-span-1", rs: "row-span-1" }, { icon: "briefcase", title: "BUSINESS STRATEGY", desc: "Transformasi digital.", img: "https://images.unsplash.com/photo-1552664730-d307ca884978?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80", cs: "md:col-span-2 lg:col-span-1", rs: "row-span-1" }, { icon: "rocket", title: "STARTUP DEV", desc: "Inovasi dari nol.", img: "https://images.unsplash.com/photo-1519389950473-47ba0277781c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80", cs: "md:col-span-3 lg:col-span-2", rs: "row-span-1" }].map((s, i) => (
                                    <div key={i} className={`relative rounded-3xl overflow-hidden group ${s.cs} ${s.rs} bg-brand-dark shadow-md`}>
                                        <img src={s.img} className="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                        <div className="absolute inset-0 bg-gradient-to-t from-brand-dark/95 via-brand-dark/70 to-brand-dark/10"></div>
                                        <div className="absolute inset-0 p-6 md:p-8 flex flex-col justify-end text-white">
                                            <div className="bg-brand-primary/90 backdrop-blur-md w-12 h-12 rounded-2xl flex items-center justify-center text-white mb-4 border border-white/20"><Icon name={s.icon} className="w-6 h-6" /></div>
                                            <h3 className="font-black text-xl md:text-2xl mb-1">{s.title}</h3>
                                            <p className="text-sm text-slate-300">{s.desc}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section className="py-20 md:py-28 bg-brand-dark text-white">
                        <div className="max-w-7xl mx-auto px-4 lg:px-8">
                            <div className="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6">
                                <h2 className="text-4xl md:text-5xl font-black">Lebih dari<br/>Sekadar Ruang Kelas.</h2>
                                <button className="bg-white/10 hover:bg-white/20 text-white border border-white/20 px-6 py-3 rounded-full font-bold transition-all">Jelajahi Kehidupan Mahasiswa</button>
                            </div>
                            <div className="grid grid-cols-1 lg:grid-cols-3 grid-rows-2 gap-4 h-[600px] lg:h-[500px]">
                                <div className="lg:col-span-2 row-span-2 relative rounded-3xl overflow-hidden group">
                                    <img src="https://images.unsplash.com/photo-1544531586-fde5298cdd40?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                    <div className="absolute inset-0 img-overlay"></div>
                                    <div className="absolute bottom-8 left-8">
                                        <span className="bg-brand-primary text-white text-[10px] font-bold px-3 py-1.5 rounded-full uppercase mb-3 inline-block shadow-sm">KULIAH PRAKTISI</span>
                                        <h3 className="text-2xl font-bold">Wawasan Langsung dari Pelaku Industri</h3>
                                    </div>
                                </div>
                                <div className="col-span-1 row-span-1 relative rounded-3xl overflow-hidden group hidden md:block">
                                    <img src="https://images.unsplash.com/photo-1552581234-26160f608093?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                    <div className="absolute inset-0 img-overlay"></div>
                                    <div className="absolute bottom-6 left-6">
                                        <span className="bg-brand-accent text-brand-dark text-[10px] font-bold px-3 py-1.5 rounded-full uppercase mb-2 inline-block shadow-sm">KUNJUNGAN INDUSTRI</span>
                                        <h3 className="text-lg font-bold">Tech Company Visit</h3>
                                    </div>
                                </div>
                                <div className="col-span-1 row-span-1 relative rounded-3xl overflow-hidden group hidden lg:block">
                                    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                    <div className="absolute inset-0 img-overlay"></div>
                                    <div className="absolute bottom-6 left-6">
                                        <span className="bg-white text-brand-dark text-[10px] font-bold px-3 py-1.5 rounded-full uppercase mb-2 inline-block shadow-sm">PROJECT</span>
                                        <h3 className="text-lg font-bold">Kolaborasi Startup</h3>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <CTASection title="YOUR DIGITAL JOURNEY STARTS HERE." description="Mulai perjalananmu di dunia Bisnis Digital. Temukan peluang, kembangkan ide, dan persiapkan masa depanmu." primaryBtn="DAFTAR SEKARANG" secondaryBtn="INFORMASI PENDAFTARAN" />
                </>
            );
        };

        const App = () => {
            const [currentPage, setCurrentPage] = React.useState('beranda');
            const [currentSubPage, setCurrentSubPage] = React.useState(null);
            const [detailSlug, setDetailSlug] = React.useState(null);

            const navigate = (page, sub = null, slug = null) => {
                setCurrentPage(page);
                setCurrentSubPage(sub);
                setDetailSlug(slug);
                window.scrollTo(0, 0);
            };

            const renderPage = () => {
                if (currentPage === 'beranda') return <HomePage />;
                
                if (currentPage === 'profil') {
                    if (currentSubPage === 'dosen' && detailSlug) {
                        const lecturer = MOCK_PROFILE_DATA.lecturers.find(l => l.slug === detailSlug);
                        return lecturer ? <DosenDetail lecturer={lecturer} /> : <EmptyState message="Dosen tidak ditemukan." />;
                    }
                    
                    return (
                        <>
                            {currentSubPage !== 'dosen-detail' && <ProfileNavigation currentSubPage={currentSubPage} navigate={navigate} />}
                            {!currentSubPage && (
                                <PageHero label="PROFIL" title="Profil Program Studi" description="Mengenal lebih dekat identitas, nilai, dan pengelola Program Studi Bisnis Digital." backgroundImage="https://images.unsplash.com/photo-1522071820081-009f0129c71c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80" breadcrumb={['Beranda', 'Profil']} />
                            )}
                            {currentSubPage === 'tentang' && <TentangProdi data={MOCK_PROFILE_DATA.about} />}
                            {currentSubPage === 'visi-misi' && <VisiMisi data={MOCK_PROFILE_DATA.visionMission} />}
                            {currentSubPage === 'sejarah' && <SejarahProdi data={MOCK_PROFILE_DATA.history} />}
                            {currentSubPage === 'sambutan-kaprodi' && <KaprodiSection data={MOCK_PROFILE_DATA.headOfProgram} />}
                            {currentSubPage === 'struktur-organisasi' && <StrukturOrganisasi data={MOCK_PROFILE_DATA.organization} />}
                            {currentSubPage === 'dosen' && !detailSlug && <ProfilDosen data={MOCK_PROFILE_DATA.lecturers} navigate={navigate} />}
                            {currentSubPage === 'akreditasi' && <Akreditasi data={MOCK_PROFILE_DATA.accreditation} />}
                        </>
                    );
                }

                return (
                    <div className="pt-[72px] min-h-screen flex items-center justify-center bg-slate-50">
                        <div className="text-center bg-white p-12 rounded-3xl shadow-sm border border-slate-100">
                            <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                <Icon name="document" className="w-10 h-10 text-slate-400" />
                            </div>
                            <h2 className="text-2xl font-bold text-brand-dark mb-3">Halaman {currentPage.charAt(0).toUpperCase() + currentPage.slice(1)} {currentSubPage ? `> ${currentSubPage}` : ''}</h2>
                            <p className="text-slate-500 mb-8">Modul halaman ini sedang dalam tahap pengembangan UI/UX.</p>
                            <button onClick={() => navigate('beranda')} className="bg-brand-primary text-white px-6 py-3 rounded-full font-bold hover:bg-blue-600 transition-all shadow-md">Kembali ke Beranda</button>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex flex-col min-h-screen selection:bg-brand-primary selection:text-white">
                    <Navbar currentPage={currentPage} currentSubPage={currentSubPage} navigate={navigate} />
                    <main className="flex-grow">{renderPage()}</main>
                    
                    <footer className="bg-brand-dark pt-20 pb-8 text-slate-400 text-sm border-t-4 border-brand-primary">
                        <div className="max-w-7xl mx-auto px-4 lg:px-8">
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 mb-16">
                                <div className="lg:pr-8">
                                    <h3 className="text-white font-black text-lg mb-2">BISNIS DIGITAL</h3>
                                    <p className="font-semibold text-slate-300 mb-4">Fakultas Ekonomi dan Bisnis<br/>Universitas Janabadra</p>
                                    <p className="leading-relaxed">Mengintegrasikan bisnis, manajemen, kewirausahaan, dan teknologi untuk masa depan.</p>
                                </div>
                                <div><h4 className="text-white font-bold mb-5 tracking-wider uppercase text-xs">Navigasi</h4><ul className="space-y-3 font-medium">{['Profil', 'Akademik', 'Kemahasiswaan', 'Informasi'].map(i => <li key={i}><a className="hover:text-brand-accent transition-colors cursor-pointer">{i}</a></li>)}</ul></div>
                                <div><h4 className="text-white font-bold mb-5 tracking-wider uppercase text-xs">Kontak</h4><ul className="space-y-3 font-medium"><li>Jl. Tentara Rakyat Mataram No. 55–57,<br/>Yogyakarta</li><li>(0274) 561039</li><li>feb@janabadra.ac.id</li></ul></div>
                                <div><h4 className="text-white font-bold mb-5 tracking-wider uppercase text-xs">Media Sosial</h4><ul className="space-y-3 font-medium">{['Instagram', 'YouTube', 'TikTok', 'LinkedIn'].map(i => <li key={i}><a className="hover:text-brand-accent transition-colors cursor-pointer">{i}</a></li>)}</ul></div>
                            </div>
                            <div className="pt-8 border-t border-slate-800 text-xs flex flex-col md:flex-row justify-between items-center gap-4">
                                <p>&copy; {new Date().getFullYear()} Program Studi Bisnis Digital, FEB, Universitas Janabadra.</p>
                                <p>Desain: Modern Academic UI</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
